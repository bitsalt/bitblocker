name: release

# Fires only on a `v*` tag push — authored ahead of the gated v1.0 tag,
# not triggered by it. No workflow_dispatch: an accidental manual run
# would attempt to create/overwrite a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  binaries:
    name: Build release binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write # to attach binaries to the tag's GitHub Release
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # go-version-file matches CI's toolchain pin exactly (go.mod: go
      # 1.25.11) — do not hardcode a version here, it would silently
      # drift from go.mod/CI over time.
      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          check-latest: false

      # Release-time verification gate: a hotfix tag could in principle
      # be pushed on a commit whose CI run never completed. Re-run the
      # same checks ci.yml runs before cutting a release from this ref.
      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Cross-compile linux/amd64 + linux/arm64 binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
              go build -trimpath -ldflags="-s -w" \
              -o "dist/bitblocker-linux-${arch}" ./cmd/bitblocker
          done
          ( cd dist && sha256sum bitblocker-linux-amd64 bitblocker-linux-arm64 > checksums.txt )

      - name: Create GitHub Release and attach binaries
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            dist/bitblocker-linux-amd64
            dist/bitblocker-linux-arm64
            dist/checksums.txt
          generate_release_notes: true

  docker:
    name: Build and push multi-arch Docker image
    runs-on: ubuntu-latest
    needs: binaries
    permissions:
      contents: read
      packages: write # to push to ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # No docker/setup-qemu-action: the Dockerfile's build stage pins
      # `--platform=$BUILDPLATFORM` and cross-compiles Go natively via
      # GOOS/GOARCH, so no instruction ever executes under an emulated
      # target architecture. QEMU would only be needed if a RUN step in
      # the runtime stage had to execute for a non-native platform.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags/labels from the pushed tag
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
